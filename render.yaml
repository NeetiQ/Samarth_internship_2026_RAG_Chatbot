services:
  - type: web
    name: legal-rag-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false  # Set in Render Dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set in Render Dashboard
      - key: SECRET_KEY
        value: aTBFTehQyAGm4p53
      - key: PINECONE_API_KEY
        sync: false  # Set in Render Dashboard
      - key: PINECONE_INDEX
        value: legal-rag
      - key: PINECONE_NAMESPACE
        value: default
      # HF Inference Service — shared base URL for /embed/* and /rerank
      - key: EMBEDDING_SERVICE_URL
        value: https://yashmit-legal-rag.hf.space
      - key: EMBEDDING_SERVICE_API_KEY
        value: aTBFTehQyAGm4p53
      # Reranker service lives on the same HF Space host
      - key: RERANKER_SERVICE_URL
        value: https://yashmit-legal-rag.hf.space
      - key: REQUEST_TIMEOUT
        value: "30"
      - key: RERANKER_ENABLED
        value: "true"
