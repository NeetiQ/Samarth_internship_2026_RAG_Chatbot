version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VECTORDB_URL=${VECTORDB_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
    volumes:
      - ./backend:/app/backend
      - ./ingestion/outputs:/app/outputs
    depends_on:
      - postgres
      - redis
    networks:
      - legal-rag-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - legal-rag-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - legal-rag-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - legal-rag-network

  # Vector Database (Milvus - optional, can be replaced with Pinecone cloud)
  milvus:
    image: milvusdb/milvus:latest
    environment:
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - legal-rag-network

volumes:
  postgres_data:
  redis_data:
  milvus_data:

networks:
  legal-rag-network:
    driver: bridge
