services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-CHANGE-ME-IN-PRODUCTION}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      STORAGE_DIR: /app/data/uploads
      SEED_CORPUS: ${SEED_CORPUS:-true}
      CHUNKED_DOCUMENTS_PATH: /app/data/corpus/chunked_documents.jsonl
      EMBEDDED_DOCUMENTS_PATH: /app/data/corpus/embedded_documents.jsonl
      GENERATE_EMBEDDINGS_ON_SEED: ${GENERATE_EMBEDDINGS_ON_SEED:-false}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: ${PINECONE_INDEX}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-default}
    volumes:
      - uploads_data:/app/data/uploads
      - corpus_data:/app/data/corpus
      - ./chunked_documents.jsonl:/app/data/corpus/chunked_documents.jsonl:ro
      - ./embedded_documents.jsonl:/app/data/corpus/embedded_documents.jsonl:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 3600s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  uploads_data:
  corpus_data:
